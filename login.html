<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Concentrix Wall of Achievers</title>
  <style>
/* ============================================
   CONCENTRIX WALL OF ACHIEVERS - MAIN STYLES
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap');

:root {
  --cnx-black:   #0a0a0f;
  --cnx-dark:    #111118;
  --cnx-card:    #16161f;
  --cnx-border:  #1e1e2e;
  --cnx-teal:    #00c2b2;
  --cnx-teal2:   #00a99d;
  --cnx-teal-glow: rgba(0,194,178,0.15);
  --cnx-white:   #f0f4f8;
  --cnx-grey:    #8892a4;
  --cnx-light:   #c5cdd8;
  --cnx-accent:  #00e5d4;
  --font-display: 'Rajdhani', sans-serif;
  --font-body: 'Inter', sans-serif;
  --radius: 12px;
  --radius-lg: 20px;
  --shadow: 0 4px 32px rgba(0,0,0,0.5);
  --shadow-teal: 0 0 40px rgba(0,194,178,0.2);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--cnx-black);
  color: var(--cnx-white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ---- SCROLLBAR ---- */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--cnx-dark); }
::-webkit-scrollbar-thumb { background: var(--cnx-teal); border-radius: 3px; }

/* ---- NAV ---- */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--cnx-border);
  padding: 0 2rem;
  height: 68px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo img { height: 32px; filter: brightness(1.1); }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a {
  color: var(--cnx-light);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--cnx-teal); }
.nav-admin-btn {
  background: var(--cnx-teal);
  color: var(--cnx-black) !important;
  padding: 0.4rem 1.2rem;
  border-radius: 6px;
  font-weight: 700;
  letter-spacing: 0.08em;
}
.nav-admin-btn:hover { background: var(--cnx-accent) !important; color: var(--cnx-black) !important; }

.nav-hamburger { display: none; background: none; border: none; cursor: pointer; }
.nav-hamburger span { display: block; width: 24px; height: 2px; background: var(--cnx-teal); margin: 5px 0; transition: 0.3s; }

/* ---- HERO ---- */
.hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  position: relative;
  overflow: hidden;
  padding: 120px 2rem 80px;
}
.hero-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,194,178,0.08) 0%, transparent 70%),
              linear-gradient(180deg, #0a0a0f 0%, #0d1117 100%);
}
.hero-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(0,194,178,0.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,194,178,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
}
.hero-content { position: relative; z-index: 2; max-width: 900px; }
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 0.6rem;
  font-size: 0.75rem; font-weight: 600; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--cnx-teal);
  border: 1px solid rgba(0,194,178,0.3);
  padding: 0.4rem 1rem; border-radius: 100px;
  margin-bottom: 1.5rem;
}
.hero-eyebrow::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--cnx-teal); }
.hero-logo { margin-bottom: 1.5rem; }
.hero-logo img { height: 48px; }
.hero-title {
  font-family: var(--font-display);
  font-size: clamp(2.8rem, 7vw, 5.5rem);
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -0.01em;
  margin-bottom: 1.5rem;
}
.hero-title .accent { color: var(--cnx-teal); }
.hero-desc {
  font-size: 1.1rem; color: var(--cnx-grey);
  max-width: 640px; margin: 0 auto 2.5rem;
  line-height: 1.7;
}
.btn-primary {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: var(--cnx-teal);
  color: var(--cnx-black);
  padding: 0.9rem 2rem; border-radius: 8px;
  font-weight: 700; font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase;
  text-decoration: none; border: none; cursor: pointer;
  transition: all 0.25s;
}
.btn-primary:hover { background: var(--cnx-accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,194,178,0.35); }
.btn-outline {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: transparent;
  color: var(--cnx-teal);
  padding: 0.9rem 2rem; border-radius: 8px;
  font-weight: 600; font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase;
  text-decoration: none; border: 1px solid rgba(0,194,178,0.4); cursor: pointer;
  transition: all 0.25s; margin-left: 1rem;
}
.btn-outline:hover { border-color: var(--cnx-teal); background: rgba(0,194,178,0.08); }

/* ---- SECTION ---- */
.section { padding: 6rem 2rem; }
.section-inner { max-width: 1200px; margin: 0 auto; }
.section-label {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--cnx-teal); margin-bottom: 0.8rem; display: block;
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 700; line-height: 1.1;
  margin-bottom: 1rem;
}
.section-desc { color: var(--cnx-grey); max-width: 620px; line-height: 1.7; margin-bottom: 3rem; }

/* ---- FEATURED ARTICLE ---- */
.featured-article {
  background: var(--cnx-card);
  border: 1px solid var(--cnx-border);
  border-radius: var(--radius-lg);
  padding: 3rem;
  position: relative; overflow: hidden;
  margin-bottom: 2rem;
}
.featured-article::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--cnx-teal), transparent);
}
.article-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
.article-tag {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--cnx-teal); background: rgba(0,194,178,0.1);
  padding: 0.3rem 0.8rem; border-radius: 4px;
  border: 1px solid rgba(0,194,178,0.25);
}
.article-date { font-size: 0.78rem; color: var(--cnx-grey); }
.article-title {
  font-family: var(--font-display);
  font-size: clamp(1.6rem, 3vw, 2.4rem);
  font-weight: 700; margin-bottom: 1.2rem;
  line-height: 1.15;
}
.article-body { color: var(--cnx-light); line-height: 1.8; font-size: 0.97rem; }
.article-body p { margin-bottom: 1rem; }
.read-more {
  display: inline-flex; align-items: center; gap: 0.4rem;
  color: var(--cnx-teal); font-weight: 600; font-size: 0.85rem;
  text-decoration: none; margin-top: 1.5rem;
  letter-spacing: 0.03em; transition: gap 0.2s;
}
.read-more:hover { gap: 0.7rem; }

/* ---- ARTICLE GRID ---- */
.article-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }
.article-card {
  background: var(--cnx-card);
  border: 1px solid var(--cnx-border);
  border-radius: var(--radius);
  padding: 2rem; position: relative; overflow: hidden;
  transition: border-color 0.25s, transform 0.25s;
  text-decoration: none; color: inherit; display: block;
}
.article-card:hover { border-color: rgba(0,194,178,0.4); transform: translateY(-4px); }
.article-card .article-title { font-size: 1.25rem; }

/* ---- ACHIEVERS WALL ---- */
.achievers-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
.achiever-card {
  background: var(--cnx-card);
  border: 1px solid var(--cnx-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
  text-align: center;
}
.achiever-card:hover {
  border-color: rgba(0,194,178,0.5);
  transform: translateY(-6px);
  box-shadow: var(--shadow-teal);
}
.achiever-img-wrap {
  position: relative;
  height: 320px; overflow: hidden;
  background: linear-gradient(135deg, #0d1117, #161620);
}
.achiever-img-wrap img {
  width: 100%; height: 100%; object-fit: cover; object-position: top;
  transition: transform 0.4s;
}
.achiever-card:hover .achiever-img-wrap img { transform: scale(1.04); }
.achiever-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,10,15,0.8) 0%, transparent 60%);
}
.achiever-badge {
  position: absolute; top: 1rem; right: 1rem;
  background: var(--cnx-teal); color: var(--cnx-black);
  font-size: 0.65rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 0.3rem 0.7rem; border-radius: 4px;
}
.achiever-info { padding: 1.5rem; }
.achiever-name {
  font-family: var(--font-display);
  font-size: 1.4rem; font-weight: 700;
  margin-bottom: 0.3rem;
}
.achiever-title { font-size: 0.8rem; color: var(--cnx-teal); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1.2rem; }
.achiever-actions { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }
.achiever-link {
  display: inline-flex; align-items: center; gap: 0.4rem;
  background: var(--cnx-teal); color: var(--cnx-black);
  padding: 0.5rem 1.2rem; border-radius: 6px;
  font-size: 0.8rem; font-weight: 700; text-decoration: none;
  letter-spacing: 0.05em; text-transform: uppercase;
  transition: all 0.2s;
}
.achiever-link:hover { background: var(--cnx-accent); transform: translateY(-1px); }
.qr-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  background: transparent; color: var(--cnx-teal);
  padding: 0.5rem 1rem; border-radius: 6px;
  font-size: 0.8rem; font-weight: 600; text-decoration: none;
  border: 1px solid rgba(0,194,178,0.35); cursor: pointer;
  letter-spacing: 0.05em; text-transform: uppercase;
  transition: all 0.2s;
}
.qr-btn:hover { background: rgba(0,194,178,0.1); }

/* ---- QR MODAL ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--cnx-card);
  border: 1px solid var(--cnx-border);
  border-radius: var(--radius-lg);
  padding: 2.5rem; text-align: center;
  max-width: 360px; width: 90%;
  position: relative;
}
.modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: none; color: var(--cnx-grey);
  font-size: 1.5rem; cursor: pointer; line-height: 1;
}
.modal-close:hover { color: var(--cnx-teal); }
.modal-title { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 0.3rem; }
.modal-sub { font-size: 0.8rem; color: var(--cnx-grey); margin-bottom: 1.5rem; }
.modal-qr { width: 200px; height: 200px; margin: 0 auto 1rem; border-radius: 8px; }

/* ---- DIVIDER ---- */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cnx-border), transparent);
  margin: 0 2rem;
}

/* ---- STATS BAR ---- */
.stats-bar {
  background: var(--cnx-card);
  border-top: 1px solid var(--cnx-border);
  border-bottom: 1px solid var(--cnx-border);
  padding: 2rem;
}
.stats-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 2rem; }
.stat-item { text-align: center; }
.stat-num { font-family: var(--font-display); font-size: 2.5rem; font-weight: 700; color: var(--cnx-teal); line-height: 1; }
.stat-label { font-size: 0.75rem; color: var(--cnx-grey); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.4rem; }

/* ---- FOOTER ---- */
.footer {
  background: var(--cnx-dark);
  border-top: 1px solid var(--cnx-border);
  padding: 3rem 2rem;
}
.footer-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 2rem; }
.footer-logo img { height: 28px; opacity: 0.8; }
.footer-copy { font-size: 0.78rem; color: var(--cnx-grey); }
.footer-links { display: flex; gap: 1.5rem; }
.footer-links a { font-size: 0.78rem; color: var(--cnx-grey); text-decoration: none; }
.footer-links a:hover { color: var(--cnx-teal); }

/* ---- PROFILE PAGE ---- */
.profile-hero {
  min-height: 50vh;
  display: flex; align-items: flex-end;
  padding: 120px 2rem 3rem;
  position: relative; overflow: hidden;
}
.profile-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #0a0a0f 0%, #0d1118 100%);
}
.profile-bg-accent {
  position: absolute; top: -100px; right: -100px;
  width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,194,178,0.12) 0%, transparent 70%);
}
.profile-inner { max-width: 1100px; margin: 0 auto; width: 100%; position: relative; z-index: 2; display: flex; align-items: flex-end; gap: 3rem; flex-wrap: wrap; }
.profile-photo-wrap { flex-shrink: 0; }
.profile-photo {
  width: 200px; height: 200px; border-radius: 50%;
  object-fit: cover; object-position: top;
  border: 4px solid var(--cnx-teal);
  box-shadow: 0 0 40px rgba(0,194,178,0.3);
}
.profile-info { flex: 1; min-width: 280px; }
.profile-badge { display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 0.8rem; }
.profile-badge span { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--cnx-teal); background: rgba(0,194,178,0.1); padding: 0.3rem 0.9rem; border-radius: 4px; border: 1px solid rgba(0,194,178,0.25); }
.profile-name { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; line-height: 1.05; margin-bottom: 0.5rem; }
.profile-role { font-size: 0.95rem; color: var(--cnx-grey); margin-bottom: 1rem; }

.profile-body { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem; }
.profile-grid { display: grid; grid-template-columns: 1fr 380px; gap: 2.5rem; }
.content-card { background: var(--cnx-card); border: 1px solid var(--cnx-border); border-radius: var(--radius-lg); padding: 2.5rem; }
.content-card h2 { font-family: var(--font-display); font-size: 1.5rem; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.6rem; }
.content-card h2::before { content: ""; display: block; width: 4px; height: 1.4rem; background: var(--cnx-teal); border-radius: 2px; }
.content-card p { color: var(--cnx-light); line-height: 1.8; margin-bottom: 1rem; font-size: 0.97rem; }
.message-card { background: var(--cnx-dark); border: 1px solid var(--cnx-border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; position: relative; }
.message-card::before { content: "❝"; position: absolute; top: 1rem; right: 1.2rem; font-size: 2rem; color: var(--cnx-teal); opacity: 0.3; }
.message-text { font-style: italic; color: var(--cnx-light); line-height: 1.7; margin-bottom: 0.8rem; font-size: 0.93rem; }
.message-author { font-size: 0.78rem; font-weight: 700; color: var(--cnx-teal); letter-spacing: 0.05em; }
.sidebar-card { background: var(--cnx-card); border: 1px solid var(--cnx-border); border-radius: var(--radius-lg); padding: 2rem; margin-bottom: 1.5rem; text-align: center; }
.sidebar-card .qr-wrap { margin: 1rem auto; }
.sidebar-card canvas { border-radius: 8px; }
.back-btn { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--cnx-grey); text-decoration: none; font-size: 0.85rem; margin-bottom: 2rem; transition: color 0.2s; }
.back-btn:hover { color: var(--cnx-teal); }

/* ---- ADMIN STYLES ---- */
.admin-wrap { display: flex; min-height: 100vh; padding-top: 68px; }
.admin-sidebar {
  width: 260px; flex-shrink: 0;
  background: var(--cnx-dark);
  border-right: 1px solid var(--cnx-border);
  padding: 2rem 0; position: fixed;
  top: 68px; left: 0; bottom: 0;
  overflow-y: auto;
}
.admin-menu { list-style: none; }
.admin-menu li a {
  display: flex; align-items: center; gap: 0.8rem;
  padding: 0.8rem 1.5rem; color: var(--cnx-grey);
  text-decoration: none; font-size: 0.87rem; font-weight: 500;
  transition: all 0.2s; border-left: 3px solid transparent;
}
.admin-menu li a:hover, .admin-menu li a.active {
  color: var(--cnx-white); background: rgba(0,194,178,0.08);
  border-left-color: var(--cnx-teal);
}
.admin-menu li a .icon { font-size: 1.1rem; }
.admin-content { flex: 1; margin-left: 260px; padding: 2rem; }
.admin-header { margin-bottom: 2rem; }
.admin-header h1 { font-family: var(--font-display); font-size: 2rem; font-weight: 700; }
.admin-header p { color: var(--cnx-grey); font-size: 0.9rem; }
.form-group { margin-bottom: 1.5rem; }
.form-label { display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--cnx-grey); margin-bottom: 0.6rem; }
.form-control {
  width: 100%; background: var(--cnx-dark);
  border: 1px solid var(--cnx-border); border-radius: 8px;
  padding: 0.8rem 1rem; color: var(--cnx-white);
  font-family: var(--font-body); font-size: 0.93rem;
  transition: border-color 0.2s;
}
.form-control:focus { outline: none; border-color: var(--cnx-teal); box-shadow: 0 0 0 3px rgba(0,194,178,0.1); }
textarea.form-control { min-height: 180px; resize: vertical; }
.form-card { background: var(--cnx-card); border: 1px solid var(--cnx-border); border-radius: var(--radius-lg); padding: 2rem; margin-bottom: 1.5rem; }
.form-card h2 { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.6rem; }
.form-card h2::before { content: ""; display: block; width: 4px; height: 1.2rem; background: var(--cnx-teal); border-radius: 2px; }
.upload-zone {
  border: 2px dashed var(--cnx-border); border-radius: 10px;
  padding: 2rem; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.upload-zone:hover { border-color: var(--cnx-teal); background: rgba(0,194,178,0.04); }
.upload-zone-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
.upload-zone p { font-size: 0.85rem; color: var(--cnx-grey); }
.upload-preview { margin-top: 1rem; }
.upload-preview img { max-height: 150px; border-radius: 8px; }
.articles-table { width: 100%; border-collapse: collapse; }
.articles-table th { text-align: left; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cnx-grey); padding: 0.8rem 1rem; border-bottom: 1px solid var(--cnx-border); }
.articles-table td { padding: 1rem; border-bottom: 1px solid rgba(30,30,46,0.5); font-size: 0.88rem; vertical-align: middle; }
.articles-table tr:hover td { background: rgba(0,194,178,0.04); }
.table-action { background: none; border: 1px solid var(--cnx-border); color: var(--cnx-grey); padding: 0.3rem 0.7rem; border-radius: 5px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; margin-right: 0.3rem; }
.table-action:hover { border-color: var(--cnx-teal); color: var(--cnx-teal); }
.table-action.danger:hover { border-color: #ff4d4d; color: #ff4d4d; }

/* ---- LOGIN PAGE ---- */
.login-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--cnx-black); position: relative; overflow: hidden; padding: 2rem;
}
.login-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 80% at 30% 50%, rgba(0,194,178,0.06) 0%, transparent 70%);
}
.login-card {
  background: var(--cnx-card); border: 1px solid var(--cnx-border);
  border-radius: var(--radius-lg); padding: 3rem;
  width: 100%; max-width: 420px; position: relative; z-index: 2;
}
.login-logo { text-align: center; margin-bottom: 2rem; }
.login-logo img { height: 36px; }
.login-title { font-family: var(--font-display); font-size: 1.8rem; text-align: center; margin-bottom: 0.3rem; }
.login-sub { font-size: 0.83rem; color: var(--cnx-grey); text-align: center; margin-bottom: 2rem; }
.login-error { background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.3); color: #ff8080; padding: 0.8rem 1rem; border-radius: 7px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
.login-error.show { display: block; }

/* ---- TOAST ---- */
.toast {
  position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
  background: var(--cnx-teal); color: var(--cnx-black);
  padding: 1rem 1.5rem; border-radius: 10px;
  font-weight: 600; font-size: 0.9rem;
  transform: translateY(100px); opacity: 0;
  transition: all 0.3s;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ---- RESPONSIVE ---- */
@media (max-width: 768px) {
  .nav-links { display: none; }
  .nav-links.open { display: flex; flex-direction: column; position: absolute; top: 68px; left: 0; right: 0; background: rgba(10,10,15,0.98); padding: 1.5rem 2rem; border-bottom: 1px solid var(--cnx-border); gap: 1rem; }
  .nav-hamburger { display: block; }
  .profile-grid { grid-template-columns: 1fr; }
  .admin-sidebar { display: none; }
  .admin-content { margin-left: 0; }
  .stats-inner { justify-content: center; }
}

  </style>

<div class="toast" id="toast"></div>
<script>
  const CREDENTIALS = { admin: btoa('cnx2025!') };

  function doLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    const err  = document.getElementById('loginError');
    if (CREDENTIALS[user] && CREDENTIALS[user] === btoa(pass)) {
      sessionStorage.setItem('cnx_admin', btoa(user + ':' + pass));
      sessionStorage.setItem('cnx_admin_user', user);
      window.location.href = 'dashboard.html';
    } else {
      err.classList.add('show');
      document.getElementById('loginUser').style.borderColor = 'rgba(255,77,77,0.5)';
      document.getElementById('loginPass').style.borderColor = 'rgba(255,77,77,0.5)';
      setTimeout(() => {
        err.classList.remove('show');
        document.getElementById('loginUser').style.borderColor = '';
        document.getElementById('loginPass').style.borderColor = '';
      }, 3500);
    }
  }

  document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
  if(sessionStorage.getItem('cnx_admin')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
